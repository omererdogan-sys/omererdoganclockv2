<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathways AI | ME & Central Asia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #0f172a; overflow: hidden; }
        .app-shell { max-width: 430px; margin: 0 auto; height: 100vh; background: #fff; display: flex; flex-direction: column; position: relative; }
        .gradient-top { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
        .blueprint-modal { transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .blueprint-modal.active { transform: translateY(0); }
        .step-circle { width: 28px; height: 28px; background: #f59e0b; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="app-shell shadow-2xl">
        
        <div class="gradient-top p-6 pt-12 pb-10 text-white rounded-b-[2.5rem]">
            <div class="flex justify-between items-center opacity-70 mb-4 text-[10px] font-black tracking-widest">
                <span>PATHWAYS AI REGIONAL v2.0</span>
                <i class="fas fa-globe-asia"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight">Pathways <span class="text-amber-400">AI</span></h1>
            <p class="text-slate-400 text-xs mt-1">Resource discovery for Central Asia & Middle East.</p>
        </div>

        <div class="px-6 -mt-8">
            <div class="bg-white rounded-3xl shadow-xl p-4 border border-slate-100">
                <div class="flex items-center space-x-3">
                    <div class="p-2 bg-amber-100 rounded-2xl text-amber-600">
                        <i class="fas fa-map-marked-alt"></i>
                    </div>
                    <div class="flex-1">
                        <select id="region" onchange="renderRegion()" class="w-full font-bold text-sm bg-transparent outline-none border-none">
                            <option value="middleeast">🏙️ Middle East (Urban/Arid)</option>
                            <option value="centralasia">🏔️ Central Asian Steppe (Rural)</option>
                        </select>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">AI Regional Intelligence</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="feed" class="flex-1 overflow-y-auto px-6 py-6 space-y-4">
            </div>

        <div id="modal" class="blueprint-modal absolute inset-0 bg-white z-50 flex flex-col">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 id="m-title" class="text-xl font-extrabold">Blueprint</h2>
                <button onclick="closeM()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="m-steps" class="p-6 overflow-y-auto space-y-6 text-slate-700"></div>
        </div>

        <div class="h-20 bg-white border-t border-slate-100 flex justify-around items-center">
            <div class="flex flex-col items-center text-amber-600 pt-1">
                <i class="fas fa-bolt text-xl"></i>
                <span class="text-[10px] font-bold mt-1 uppercase">Today</span>
            </div>
            <div class="flex flex-col items-center text-slate-300 opacity-50">
                <i class="fas fa-scroll text-xl"></i>
                <span class="text-[10px] font-bold mt-1 uppercase">Market</span>
            </div>
            <div class="flex flex-col items-center text-slate-300 opacity-50">
                <i class="fas fa-shield-halved text-xl"></i>
                <span class="text-[10px] font-bold mt-1 uppercase">Safety</span>
            </div>
        </div>
    </div>

    <script>
        const regionalData = {
            middleeast: {
                aiNote: "Peak sun intensity detected. High demand for cooling and drinking water in district market.",
                opps: [
                    {
                        title: "Solar Water Condenser",
                        type: "INDEPENDENT",
                        reward: "$5-$8 / Day",
                        icon: "fa-droplet",
                        color: "blue",
                        steps: [
                            "Find a clean discarded plastic tarp or sheet.",
                            "Dig a 50cm hole in sunny soil. Place a cup in the center.",
                            "Cover with the tarp, weighed down by a stone in the center.",
                            "Solar heat will create condensation. Collect water to sell for irrigation or cleaning."
                        ]
                    },
                    {
                        title: "PVC Rocket Kits",
                        type: "CRAFT",
                        reward: "$12 - $15 ea",
                        icon: "fa-rocket",
                        color: "orange",
                        steps: [
                            "Gather scrap 1/2 inch PVC pipe from local construction sites.",
                            "Use a plastic soda bottle as the 'engine'.",
                            "Demonstrate the 'Stomp Launch' at local evening festivals.",
                            "Sell the design as a child's toy kit."
                        ]
                    }
                ]
            },
            centralasia: {
                aiNote: "Strong wind patterns detected. High-quality wool discarded at local textile mill #2.",
                opps: [
                    {
                        title: "Felted Wool Insulation",
                        type: "UPCYCLE",
                        reward: "$20 / Set",
                        icon: "fa-socks",
                        color: "amber",
                        steps: [
                            "Collect scrap wool/felt from textile waste bins.",
                            "Follow the 'Wet Felting' guide to create thick sheets.",
                            "Sell as affordable insulation for Yurt/home window seals.",
                            "Demand is high in rural outskirts tonight."
                        ]
                    },
                    {
                        title: "Scrap Steel Forging",
                        type: "METAL",
                        reward: "Market Price",
                        icon: "fa-fire-burner",
                        color: "rose",
                        steps: [
                            "Identify high-grade carbon steel from old farm machinery.",
                            "Local blacksmith 'Kagan' is buying scrap for hand-forging today.",
                            "Transport to the bazaar district for weight-based payment."
                        ]
                    }
                ]
            }
        };

        function renderRegion() {
            const r = document.getElementById('region').value;
            const data = regionalData[r];
            const feed = document.getElementById('feed');

            let html = `
                <div class="bg-amber-50 border border-amber-100 p-4 rounded-3xl">
                    <p class="text-[10px] font-black text-amber-800 uppercase mb-1">Regional AI Status</p>
                    <p class="text-xs text-amber-900 leading-tight font-medium">${data.aiNote}</p>
                </div>
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mt-6 mb-2">Immediate Pathways</h3>
            `;

            data.opps.forEach(o => {
                html += `
                <div class="bg-white p-5 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-12 h-12 bg-slate-900 text-amber-400 rounded-2xl flex items-center justify-center">
                            <i class="fas ${o.icon} fa-xl"></i>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">${o.type}</span>
                            <p class="text-lg font-bold text-amber-600">${o.reward}</p>
                        </div>
                    </div>
                    <h4 class="text-lg font-bold text-slate-900 mb-4">${o.title}</h4>
                    <button onclick='openM("${o.title}", ${JSON.stringify(o.steps)})' class="w-full bg-slate-100 hover:bg-amber-500 hover:text-white text-slate-900 font-bold py-3 rounded-2xl transition-all text-sm uppercase tracking-wide">
                        View Blueprint
                    </button>
                </div>
                `;
            });
            feed.innerHTML = html;
        }

        function openM(title, steps) {
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-steps').innerHTML = steps.map((s, i) => `
                <div class="flex space-x-4">
                    <div class="step-circle">${i+1}</div>
                    <p class="text-sm font-semibold text-slate-600 pt-1 leading-relaxed">${s}</p>
                </div>
            `).join('');
            document.getElementById('modal').classList.add('active');
        }

        function closeM() { document.getElementById('modal').classList.remove('active'); }

        renderRegion();
    </script>
</body>
</html>
